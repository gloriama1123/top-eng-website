<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Eng Institute 拓英美語</title>
<link rel="stylesheet" href="style.css">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>

<body>
<div class="decor decor1"></div>
<div class="decor decor2"></div>

<div class="floating-shapes">
    <span class="shape pink"></span>
    <span class="shape blue"></span>
    <span class="shape yellow"></span>
</div>

<header>
    <div class="logo">
        <img src="images/logo.png" alt="Top Eng Logo">
        <h1>拓英美語</h1>
    </div>

    <nav>
        <a href="#">課程介紹</a>
        <a href="#">活動消息</a>
        <a href="#">學生成果</a>
        <a href="#">影音專區</a>
        <a href="#">聯絡我們</a>
        <button class="btn-secondary">立即諮詢</button>
    </nav>
</header>

<section class="hero">
    <div class="hero-content">
        <div class="hero-text">
            <h2>讓孩子快樂學習，自信成長</h2>
            <p>拓英美語 × 專業教學 × 溫暖陪伴</p>
            <button class="btn-primary">預約試聽</button>
        </div>

        <div class="hero-image">
            <img id="mascot" src="images/Reading Unicorn.png" alt="Unicorn Mascot">

                <div class="speech-bubble">
                    歡迎來到拓英美語！
                </div>

        </div>
    </div>
</section>

<section class="courses">
  <h2>我們的課程</h2>
  <p class="course-intro">依照不同年齡與程度，提供最適合的學習規劃</p>

  <div class="course-list">

    <!-- COURSE ITEM -->
    <div class="course-item pink">
      <h3>幼兒美語</h3>
      <p>建立語感與學習興趣</p>
    </div>

    <div class="course-item blue">
      <h3>國小英文</h3>
      <p>扎實基礎 × 口說訓練</p>
    </div>

  </div>
</section>

<section class="albums">
  <h2>活動紀錄</h2>

  <div class="album-grid">

    <a href="album1.html" class="album-card">
      <img src="images/photo1.jpg">
      <h3>聖誕活動</h3>
    </a>

    <a href="album2.html" class="album-card">
      <img src="images/photo1.jpg">
      <h3>萬聖節派對</h3>
    </a>

  </div>
</section>

<section class="videos">
    <h2>活動影片</h2>

    <div class="video-grid">

        <iframe src="https://www.youtube.com/embed/noAdLFF8RVE"></iframe>
        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>

    </div>
</section>

<section class="contact">
    <button class="btn-primary">預約試聽</button>
    <form>
        <input type="text" placeholder="家長姓名">
        <input type="text" placeholder="聯絡電話">
        <textarea placeholder="孩子年級 / 想詢問的內容"></textarea>
        <button type="submit">送出</button>
    </form>
</section>

<footer>
    <p>© 2026 拓英美語 Top Eng Institute</p>
</footer>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();
</script>

<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>

</body>
</html>
