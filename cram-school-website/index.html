<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Eng Institute 拓英美語</title>
<link rel="stylesheet" href="style.css">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>

<body>

<div class="floating-shapes">
    <span class="shape pink"></span>
    <span class="shape blue"></span>
    <span class="shape yellow"></span>
</div>

<header>
    <div class="logo">
        <img src="images/logo.png" alt="Top Eng Logo">
        <h1>拓英美語</h1>
    </div>

    <nav>
        <a href="#">課程介紹</a>
        <a href="#">活動消息</a>
        <a href="#">學生成果</a>
        <a href="#">影音專區</a>
        <a href="#">聯絡我們</a>
    </nav>
</header>

<section class="hero">
    <div class="hero-content">
        <div class="hero-text">
            <h2>讓孩子快樂學習，自信成長</h2>
            <p>拓英美語 × 專業教學 × 溫暖陪伴</p>
            <button>立即預約試聽</button>
        </div>

        <div class="hero-image">
            <img id="mascot" src="images/Reading Unicorn.png" alt="Unicorn Mascot">

                <div class="speech-bubble">
                    歡迎來到拓英美語！
                </div>

        </div>
    </div>
</section>

<section class="programs">
    <h2>熱門課程</h2>

    <div class="slider">
        <div class="slide-track">

            <div class="card">幼兒美語</div>
            <div class="card">國小英文</div>
            <div class="card">國中英文</div>
            <div class="card">高中英文</div>
            <div class="card">數學輔導</div>
            <div class="card">作業指導</div>

            <!-- duplicate for smooth loop -->
            <div class="card">幼兒美語</div>
            <div class="card">國小英文</div>
            <div class="card">國中英文</div>
            <div class="card">高中英文</div>

        </div>
    </div>
</section>

<section class="gallery">
    <h2>學生成長紀錄</h2>

    <div class="gallery-grid">
        <img src="images/photo1.jpg">
        <img src="images/photo2.jpg">
        <img src="images/photo3.jpg">
        <img src="images/photo4.jpg">
    </div>
</section>

<section class="videos">
    <h2>活動影片</h2>

    <div class="video-grid">

        <iframe src="https://www.youtube.com/watch?v=noAdLFF8RVE"></iframe>
        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>

    </div>
</section>

<section class="contact">
    <h2>預約試聽</h2>
    <form>
        <input type="text" placeholder="家長姓名">
        <input type="text" placeholder="聯絡電話">
        <textarea placeholder="孩子年級 / 想詢問的內容"></textarea>
        <button type="submit">送出</button>
    </form>
</section>

<footer>
    <p>© 2026 拓英美語 Top Eng Institute</p>
</footer>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();
</script>

</body>
</html>
