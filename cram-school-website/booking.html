<section class="booking">
  <h2>預約試聽 / 參觀</h2>

  <form>
    <input type="text" placeholder="孩子姓名" required>
    <input type="text" placeholder="學校" required>
    <input type="text" placeholder="年級" required>
    <input type="text" placeholder="聯絡電話" required>

    <button type="submit">送出預約</button>
  </form>
</section>
