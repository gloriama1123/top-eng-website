backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "courses"
    label: "課程管理 (Courses)"
    folder: "content/courses"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "課程名稱", name: "title", widget: "string" }
      - { label: "簡短介紹", name: "summary", widget: "string" }
      - { label: "詳細內容", name: "body", widget: "markdown" }
      - { label: "卡片顏色", name: "color", widget: "select", options: ["pink","blue","yellow","green","purple"] }

  - name: "albums"
    label: "活動相簿 (Albums)"
    folder: "content/albums"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "活動名稱", name: "title", widget: "string" }
      - { label: "活動介紹", name: "description", widget: "text" }
      - { label: "照片列表", name: "images", widget: "list", field: {label: Image, name: image, widget: image} }

  - name: "site"
    label: "網站全域設定 (Site Settings)"
    delete: false
    files:
      - name: "base_info"
        file: "content/site.yml"
        label: "基本內容"
        fields:
          - { label: "首頁大標題", name: "hero_title", widget: "string" }
          - { label: "副標題", name: "hero_subtitle", widget: "string" }
          - { label: "吉祥物圖片", name: "mascot", widget: "image" }
          - { label: "LINE ID", name: "line_id", widget: "string", hint: "@example" }
